{% load static %}
  <title>Infonu-Login</title>
  <link rel="stylesheet" href="{% static 'css/login.css' %}">
  <link rel="Website Icon" type="jpg" href="static\images\Infonu.jpg">
<body>
    <div id="main-div">
    <div class="sec1-logo"><a href="{% url 'index' %}"><img src="static\images\slogam.png" class="sec1-img" alt=""></a></div>
    <div id="section1">
    <center><p id="sect1-p">Log in</p></center>
    <form method="POST">
    {% csrf_token %}
    <label for="username">Username:</label>
    <input type="text" id="username" name="username" required>

    <label for="password">Password:</label>
    <input type="password" id="password" name="password" required>

    <button type="submit">Login</button>
    </form>

    <a href="#" id="sec1-a">Forgot your password?</a>
    <div class="signup"><p class="signup-p">Don't have an account?<a href="{% url 'signup' %}" class="signup-a">Create one</a></p></div>
  </div>
  </div>
  <hr>
<div style="color: #a09c9c;"><center>© Copyright 2025 -Infonusolutions. All rights reserved.</center></div>

</body>
</html>
