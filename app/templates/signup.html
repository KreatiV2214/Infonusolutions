{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infonu-Signup</title>
    <link rel="stylesheet" href="{% static 'css/signup.css' %}">
    <link rel="Website Icon" type="jpg" href="static\images\Infonu.jpg">
</head>
<body>
  <div id="main-div">
    <div class="sec1-logo"><a href="{% url 'index' %}"><img src="static\images\slogam.png" class="sec1-img" alt=""></a></div>
     <div class="login">
    <div id="section1">
    <center><p id="sect1-p">Create your account</p></center>
    <form method="POST">
    {% csrf_token %}
    <label>Username:</label>
    <input type="text" name="username" required>

    <label>Email:</label>
    <input type="email" name="email" required>

    <label>Password:</label>
    <input type="password" name="password" required>

    <button type="submit">Sign Up</button>
    </form>

    <a href="login.html" id="sec1-a">Already have an account? Log in</a>
  </div>
  </div>
</div>
<hr>
<div style="color: #a09c9c;" ><center>© Copyright 2025 -Infonusolutions. All rights reserved.</center></div>
</body>
</html>
