{% extends 'base.html' %}
{% load static %}


<link rel="stylesheet" href="{% static 'css/store.css' %}">

{% block content %}

<div class="product-grid">

    {% for product in products %}
    <div class="card">

        <img src="{{ product.image.url }}" class="card-img" alt="{{ product.name }}">

        <div class="card-body">
            <h2 class="card-title">{{ product.name }}</h2>
            <p class="card-desc">{{ product.description }}</p>
            <p class="card-price">₹{{ product.price }}</p>

            <a href="https://wa.me/9551566406?text=Hi! I'm interested in this product!!%0AName: {{ product.name }}%0APrice: ₹{{ product.price }}%0ADescription: {{ product.description }}"
               target="_blank">
                <button class="card-btn">View product</button>
            </a>
        </div>

    </div>
    {% endfor %}
</div>

{% endblock %}
