{% extends "base.html" %}
{% load static %}
{% block content %}
<div class="product-detail">

    <div class="product-detail-left">
        <img src="{{ product.image.url }}" alt="{{ product.name }}">
    </div>

    <div class="product-detail-right">
        <h1 class="detail-title">
            {{ product.name }}
        </h1>

        <p class="detail-price">
            ₹{{ product.price }}
        </p>

        <p class="detail-desc">
            {{ product.description }}
        </p>

        <a href="https://wa.me/9551566406?text=Hi! I'm interested in this product!!%0AName: {{ product.name }}%0APrice: ₹{{ product.price }}%0ADescription: {{ product.description }}"
               target="_blank">
            <button class="detail-btn">Enquire Product</button>
        </a>
    </div>

</div>
{% endblock %}
